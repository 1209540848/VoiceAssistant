<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Assistant</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="page-title">
        <header class="titlebar">
          <div class="brand-block">
            <p class="eyebrow">Desktop Voice Assistant</p>
            <div class="brand-line">
              <h1 id="page-title">Voice Assistant</h1>
              <span class="app-tag">本地工作台</span>
            </div>
            <p class="subcopy" id="environmentNote"></p>
          </div>

          <div class="status-stack">
            <div class="status-pill" id="statusPill" aria-live="polite">
              <i data-lucide="circle-dot"></i>
              <span id="statusText">待输入</span>
            </div>
            <div class="meta-row">
              <span class="meta-chip" id="transcriptMeta">等待语音输入</span>
              <span class="meta-chip" id="sessionMeta">未开始</span>
            </div>
          </div>
        </header>

        <section class="main-grid" aria-label="工作台">
          <section class="panel control-panel" aria-labelledby="control-title">
            <div class="panel-heading">
              <div>
                <h2 id="control-title">录音控制</h2>
                <p class="panel-note">按住最核心的入口，不要让用户先读说明。</p>
              </div>
              <span class="mini-chip" id="sourceBadge">麦克风</span>
            </div>

            <div class="control-body">
              <button class="record-button" id="recordButton" type="button" aria-pressed="false">
                <span class="record-ring">
                  <i data-lucide="mic"></i>
                </span>
                <span id="recordButtonText">开始说话</span>
              </button>

              <div class="control-stack">
                <div class="meter" id="meter" aria-hidden="true">
                  <span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span>
                </div>
                <p class="timer" id="timer">00:00</p>
                <p class="control-hint" id="controlHint">开始后会持续发送音频帧。</p>
              </div>
            </div>

            <div class="control-meta">
              <div class="mini-stat">
                <span>输入格式</span>
                <strong>PCM / 16kHz</strong>
              </div>
              <div class="mini-stat">
                <span>连接方式</span>
                <strong>WebSocket</strong>
              </div>
              <div class="mini-stat">
                <span>输出节奏</span>
                <strong>边说边出字</strong>
              </div>
            </div>
          </section>

          <section class="result-column" aria-label="转写结果">
            <article class="panel transcript-panel" aria-labelledby="transcript-title">
              <div class="panel-heading">
                <div>
                  <h2 id="transcript-title">实时转写</h2>
                  <p class="panel-note">这里显示当前帧输出的文本。</p>
                </div>
              <span class="mini-chip" id="liveStateBadge">等待输入</span>
            </div>
            <pre class="text-box empty" id="transcriptText">点击“开始说话”后，这里会显示识别结果。</pre>
          </article>

          <article class="panel diagnostics-panel" aria-labelledby="diagnostic-title">
            <div class="panel-heading">
              <div>
                <h2 id="diagnostic-title">会话诊断</h2>
                  <p class="panel-note">保留 trace、request、延迟和失败原因。</p>
              </div>
                <span class="mini-chip" id="resultCount">0 字</span>
              </div>

              <div class="diagnostic-grid">
                <div class="diagnostic-item">
                  <span class="diagnostic-label">Trace</span>
                  <strong id="traceValue">-</strong>
                </div>
                <div class="diagnostic-item">
                  <span class="diagnostic-label">Request</span>
                  <strong id="requestValue">-</strong>
                </div>
                <div class="diagnostic-item">
                  <span class="diagnostic-label">延迟</span>
                  <strong id="timingValue">-</strong>
                </div>
                <div class="diagnostic-item">
                  <span class="diagnostic-label">错误</span>
                  <strong id="errorValue">-</strong>
                </div>
              </div>

              <div class="action-bar" aria-label="操作">
                <button class="ghost-button" id="copyOriginalButton" type="button">
                  <i data-lucide="copy"></i>
                  复制转写
                </button>
                <button class="ghost-button" id="clearButton" type="button">
                  <i data-lucide="trash-2"></i>
                  清空
                </button>
              </div>
            </article>
          </section>
        </section>

        <p class="feedback" id="feedback" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
